<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¿Quieres ser mi novia? 💖</title>
    <style>
        /* ... (Tu CSS anterior se mantiene, solo modifica esto) ... */
        
        .buttons-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            /* Aumentamos el min-height y añadimos overflow hidden para que no se salga */
            min-height: 200px; 
            position: relative;
            overflow: hidden; 
            padding: 20px;
        }

        .btn-no {
            position: absolute; /* Esto permite el movimiento libre */
            background: #674b3c;
            color: #ffe4d6;
            transition: all 0.2s ease;
            touch-action: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="love-card" id="appCard">
        <div class="corazon-flotante">💖💕💘</div>
        <h1>✨ ¿Quieres ser mi novia? ✨</h1>
        
        <div class="frase-pasarela" id="fraseDinamica">
            <span>💗</span> ¡Ándale, di que SÍ, te voy a tratar bonito! 💗
        </div>

        <div class="buttons-zone" id="zonaBotones">
            <button class="btn-yes" id="btnSi">💕 SÍ, ACEPTO 💕</button>
            <button class="btn-no" id="btnNo">😈 NO 😈</button>
        </div>

        <div id="mensajeFinal" class="final-message hidden">
            🎉💖 ¡LO SABÍA! 💖🎉<br>
            <span style="font-size:1.2rem;">💞 ¡Te quiero muchísimo! 💞</span>
        </div>
        <footer>💌 Hecho con mucho amor 💌</footer>
    </div>

    <script>
        // Tu lógica JS original...
        // Asegúrate de que la función moverBotonNo tenga márgenes:
        function moverBotonNo() {
            const zona = document.getElementById('zonaBotones');
            const btn = document.getElementById('btnNo');
            const rect = zona.getBoundingClientRect();
            
            // Margen para que no se pegue a las paredes
            const maxX = rect.width - btn.offsetWidth - 20;
            const maxY = rect.height - btn.offsetHeight - 20;
            
            const randomX = Math.max(10, Math.random() * maxX);
            const randomY = Math.max(10, Math.random() * maxY);
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
        }
        
        document.getElementById('btnNo').addEventListener('mouseover', moverBotonNo);
        document.getElementById('btnNo').addEventListener('touchstart', (e) => {
            e.preventDefault();
            moverBotonNo();
        });
    </script>
</body>
</html>
